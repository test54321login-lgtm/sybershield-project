<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CyberShield</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">CyberShield</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="encyclopedia/index.html">Encyclopedia</a></li>
                <li><a href="quiz.html">Quiz</a></li>
                <li><a href="checklist.html">Checklist</a></li>
                <li><a href="feed.html">News & Tips</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-form">
                <h2>Login to CyberShield</h2>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                
                <p>Don't have an account? <a href="#" id="showSignup">Sign Up</a></p>
            </div>
            
            <div class="auth-form" id="signupFormContainer" style="display: none;">
                <h2>Sign Up for CyberShield</h2>
                
                <form id="signupForm">
                    <div class="form-group">
                        <label for="signupUsername">Username:</label>
                        <input type="text" id="signupUsername" name="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signupEmail">Email:</label>
                        <input type="email" id="signupEmail" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="signupPassword">Password:</label>
                        <input type="password" id="signupPassword" name="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </form>
                
                <p>Already have an account? <a href="#" id="showLogin">Login</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CyberShield. All rights reserved.</p>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthPage();
        });
    </script>
</body>
</html>
